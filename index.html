<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kancelář - Osobní Rádci</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-grad);
            color: white;
            box-sizing: border-box;
        }

        .page {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
        }

        .row-label {
            padding: 18px 32px 8px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            border-top: 1px solid var(--glass-border);
        }
        .row-label:first-child {
            border-top: none;
        }

        .avatar-row {
            display: flex;
            flex: 1;
            gap: 1px;
            background: var(--glass-border);
        }

        .avatar-section {
            flex: 1;
            min-height: 45vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--bg-grad);
        }

        .header {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 32px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            z-index: 10;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            white-space: nowrap;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .avatar-section:hover .header {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%) translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover; 
            background: transparent;
        }

        .loading-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }

        .iframe-container iframe {
            position: relative;
            z-index: 2;
        }

        @media (max-width: 900px) {
            .avatar-row {
                flex-direction: column;
            }
            .avatar-section {
                min-height: 35vh;
            }
            .header {
                font-size: 1rem;
                top: 15px;
                padding: 10px 24px;
            }
        }
    </style>
    <!-- Modern Typeface -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <!-- Radovský row -->

        <div class="avatar-row">

                    <iframe src="https://embed.liveavatar.com/v1/9127a822-f00a-456d-83c2-b8c48b040bbf" allow="microphone" title="Radovský I"></iframe>
                </div>
            </div>

                </div>
            </div>

            <div class="avatar-section">
                <div class="loading-bg">Načítám avatara...</div>
                <div class="header">Radovský III</div>
                <div class="iframe-container">

            </div>

            <div class="avatar-section">

        <!-- Hamr row -->

            </div>

            <div class="avatar-section">
                <div class="loading-bg">Načítám avatara...</div>

                <div class="iframe-container">

            <div class="avatar-section">

                </div>
            </div>

            <div class="avatar-section">
                <div class="loading-bg">Načítám avatara...</div>
                <div class="header">Hamr IV</div>
                <div class="iframe-container">
                    <iframe src="https://embed.liveavatar.com/v1/50da3de8-0b17-477a-9ea4-571830eceeec?orientation=horizontal" allow="microphone" title="Hamr IV"></iframe>
                </div>

        </div>
    </div>
</body>
</html>
