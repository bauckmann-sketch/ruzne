<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kancelář - Osobní Rádci</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-grad);
            color: white;
            overflow: hidden;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-wrap: wrap; /* Wraps to next line for 2x2 grid */
            width: 100%;
            height: 100%;
            gap: 1px; /* Creates a subtle line between sections */
            background: var(--glass-border); /* The line color */
        }

        .avatar-section {
            flex: 1 1 calc(50% - 1px);
            min-height: 50vh; /* Ensures a 2x2 split vertically */
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--bg-grad);
        }

        .header {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 32px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            z-index: 10;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            white-space: nowrap;
            transition: all 0.3s ease;
            pointer-events: none; /* Let clicks pass through if needed */
        }

        .avatar-section:hover .header {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%) translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Force object fitting inside the iframe bounds */
            object-fit: cover; 
            background: transparent;
        }

        /* Loading indicator fallback behind the iframe */
        .loading-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }

        .iframe-container iframe {
            position: relative;
            z-index: 2;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .header {
                font-size: 1rem;
                top: 15px;
                padding: 10px 24px;
            }
        }
    </style>
    <!-- Modern Typeface -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Avatar 1 -->
        <div class="avatar-section">
            <div class="loading-bg">Načítám avatara...</div>
            <div class="header">Radovský I</div>
            <div class="iframe-container">
                <iframe src="https://embed.liveavatar.com/v1/9127a822-f00a-456d-83c2-b8c48b040bbf" allow="microphone" title="Radovský I"></iframe>
            </div>
        </div>

        <!-- Avatar 2 -->
        <div class="avatar-section">
            <div class="loading-bg">Načítám avatara...</div>
            <div class="header">Radovský II</div>
            <div class="iframe-container">
                <iframe src="https://embed.liveavatar.com/v1/a6121105-1558-484d-9015-872bf7a86425" allow="microphone" title="Radovský II"></iframe>
            </div>
        </div>

        <!-- Avatar 3 - Jan Radovský II -->
        <div class="avatar-section">
            <div class="loading-bg">Načítám avatara...</div>
            <div class="header">Hamr I</div>
            <div class="iframe-container">
                <iframe src="https://embed.liveavatar.com/v1/7388cad4-0452-4289-b627-4c7016b6a53a" allow="microphone" title="Hamr I"></iframe>
            </div>
        </div>

        <!-- Avatar 4 - Jan Hamr II -->
        <div class="avatar-section">
            <div class="loading-bg">Načítám avatara...</div>
            <div class="header">Hamr II</div>
            <div class="iframe-container">
                <iframe src="https://embed.liveavatar.com/v1/1d224de0-f7bf-4286-8a85-0f34fe85f129" allow="microphone" title="Hamr II"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
