<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jan Radovský – AI Avatar</title>
    <meta name="description" content="Promluvte si s AI avatarem Jana Radovského. Interaktivní konverzace poháněná umělou inteligencí.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
        }

        /* ── Container ── */
        .avatar-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.05);
            background: #0a0a0a;
        }

        /* ── Video element (replaces iframe) ── */
        .avatar-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
            z-index: 1;
        }

        /* ── Cover overlay ── */
        .cover-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cover-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .cover-photo {
            flex: 1;
            width: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Bottom control bar ── */
        .control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 16px 24px;
            background: white;
            border-radius: 0 0 16px 16px;
        }

        .lang-select {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #1a1a1a;
            user-select: none;
            min-width: 140px;
            justify-content: space-between;
        }

        .lang-select .chevron {
            width: 12px;
            height: 12px;
        }

        .chat-btn {
            padding: 12px 36px;
            background: #2BCBF2;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .chat-btn:hover {
            background: #19b8e0;
            transform: translateY(-1px);
        }

        /* ── Connecting overlay ── */
        .connecting-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            font-size: 1.1rem;
        }

        .connecting-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #2BCBF2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Session controls (shown when connected) ── */
        .session-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .session-controls.visible {
            display: flex;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            backdrop-filter: blur(8px);
        }

        .ctrl-btn:hover {
            transform: scale(1.1);
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .btn-mute {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-mute.muted {
            background: rgba(239, 68, 68, 0.7);
        }

        .btn-end {
            background: rgba(239, 68, 68, 0.8);
        }

        .btn-end:hover {
            background: rgba(239, 68, 68, 1);
        }

        /* ── Error overlay ── */
        .error-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 25;
            background: rgba(0, 0, 0, 0.9);
            color: #f87171;
            font-size: 1rem;
            padding: 24px;
            text-align: center;
        }

        .error-overlay.visible {
            display: flex;
        }

        .error-overlay button {
            padding: 10px 28px;
            background: #2BCBF2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── Timer ── */
        .session-timer {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 15;
            display: none;
            padding: 4px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 0.9rem;
            font-family: 'Inter', monospace;
            font-variant-numeric: tabular-nums;
        }

        .session-timer.visible {
            display: block;
        }

        .session-timer.warning {
            background: rgba(239, 68, 68, 0.8);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .avatar-wrapper {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .control-bar {
                border-radius: 0;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="avatar-wrapper" id="avatarWrapper">
        <!-- Video element for avatar stream -->
        <video class="avatar-video" id="avatarVideo" autoplay playsinline
               poster="https://static.liveavatar.com/avatars/thumbnails/297ffc737d774f7ab53bf1eb67bb4cae/thumbnail_d539bd2a9813461aa934dcd8d4564ccc.png">
        </video>

        <!-- Session timer -->
        <div class="session-timer" id="sessionTimer">5:00</div>

        <!-- Session controls (mic + end) -->
        <div class="session-controls" id="sessionControls">
            <button class="ctrl-btn btn-mute" id="btnMute" onclick="toggleMute()" title="Ztlumit/Zapnout mikrofon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path id="micIcon" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <button class="ctrl-btn btn-end" id="btnEnd" onclick="endSession()" title="Ukončit konverzaci">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>

        <!-- Connecting overlay -->
        <div class="connecting-overlay" id="connectingOverlay">
            <div class="spinner"></div>
            <span>Připojuji se…</span>
        </div>

        <!-- Error overlay -->
        <div class="error-overlay" id="errorOverlay">
            <span id="errorMessage">Něco se pokazilo.</span>
            <button onclick="resetAndRetry()">Zkusit znovu</button>
        </div>

        <!-- Cover overlay with photo + controls -->
        <div class="cover-overlay" id="coverOverlay" onclick="startAvatar()">
            <img src="cover.png" alt="Jan Radovský" class="cover-photo" id="coverImage">
            <div class="control-bar">
                <div class="lang-select">
                    <span>Czech</span>
                    <svg class="chevron" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 4l4 4 4-4" stroke="#666" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <button class="chat-btn" type="button">Chat now</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ── LiveAvatar SDK loaded from CDN ──
        const SDK_URL = 'https://cdn.jsdelivr.net/npm/@heygen/liveavatar-web-sdk/+esm';

        const EMBED_ID = '87020354-2150-4fe9-9b40-79f7db17965f';
        const API_URL  = 'https://api.liveavatar.com';
        const MAX_DURATION = 300; // 5 minutes

        let session = null;
        let isMuted = false;
        let avatarStarted = false;
        let timerInterval = null;
        let SDK = null;
        let attachInterval = null;

        // Pre-load SDK in background
        (async () => {
            try {
                SDK = await import(SDK_URL);
                // Log ALL exports so we can find the right enum values
                console.log('LiveAvatar SDK exports:', Object.keys(SDK));
                for (const [key, val] of Object.entries(SDK)) {
                    if (typeof val === 'object' && val !== null) {
                        console.log(`  SDK.${key} =`, JSON.stringify(val));
                    } else if (typeof val === 'function') {
                        console.log(`  SDK.${key} = [Function]`);
                    } else {
                        console.log(`  SDK.${key} =`, val);
                    }
                }
            } catch (e) {
                console.warn('Failed to preload SDK:', e);
            }
        })();

        // ── Expose functions to global scope for onclick handlers ──
        window.startAvatar = startAvatar;
        window.toggleMute  = toggleMute;
        window.endSession  = endSession;
        window.resetAndRetry = resetAndRetry;

        async function startAvatar() {
            if (avatarStarted) return;
            avatarStarted = true;

            const cover      = document.getElementById('coverOverlay');
            const connecting = document.getElementById('connectingOverlay');
            const video      = document.getElementById('avatarVideo');

            // Show connecting, hide cover
            connecting.classList.add('visible');
            cover.classList.add('hidden');

            try {
                // 1. Load SDK if not preloaded
                if (!SDK) {
                    SDK = await import(SDK_URL);
                    console.log('SDK loaded on demand:', Object.keys(SDK));
                }

                // 2. Request microphone permission
                let hasAudio = true;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) {
                    console.warn('No microphone access:', e);
                    hasAudio = false;
                }

                // 3. Get session token from LiveAvatar API
                const tokenRes = await fetch(`${API_URL}/v1/sessions/embed/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embed_id: EMBED_ID,
                        language: 'cs'
                    })
                });

                const tokenData = await tokenRes.json();
                if (!tokenRes.ok || tokenData.code !== 1000) {
                    throw new Error(tokenData.message || 'Failed to get session token');
                }

                const sessionToken = tokenData.data.session_token;
                console.log('Session token obtained');

                // 4. Find the session class
                const SessionClass = SDK.LiveAvatarSession || SDK.default?.LiveAvatarSession || SDK.Session;
                if (!SessionClass) {
                    throw new Error('LiveAvatarSession class not found. Exports: ' + Object.keys(SDK).join(', '));
                }

                // 5. Create session
                session = new SessionClass(sessionToken, {
                    voiceChat: hasAudio,
                    apiUrl: API_URL
                });

                // 6. Find event enum values from SDK exports
                const SessionEvent = SDK.SessionEvent || SDK.SessionEvents || {};
                const SessionState = SDK.SessionState || SDK.SessionStates || {};

                console.log('SessionEvent:', JSON.stringify(SessionEvent));
                console.log('SessionState:', JSON.stringify(SessionState));

                // 7. Register event handlers using BOTH enum values and string guesses
                const eventNames = {
                    streamReady: [
                        SessionEvent.SESSION_STREAM_READY,
                        'session_stream_ready',
                        'SESSION_STREAM_READY',
                        'streamReady',
                        'stream_ready'
                    ].filter(Boolean),
                    stateChanged: [
                        SessionEvent.SESSION_STATE_CHANGED,
                        'session_state_changed',
                        'SESSION_STATE_CHANGED',
                        'stateChanged',
                        'state_changed'
                    ].filter(Boolean),
                    disconnected: [
                        SessionEvent.SESSION_DISCONNECTED,
                        'session_disconnected',
                        'SESSION_DISCONNECTED',
                        'disconnected'
                    ].filter(Boolean)
                };

                const connecting2 = document.getElementById('connectingOverlay');
                const controls   = document.getElementById('sessionControls');
                const timer      = document.getElementById('sessionTimer');

                // Stream ready event
                for (const name of eventNames.streamReady) {
                    try {
                        session.on(name, () => {
                            console.log(`[EVENT ${name}] Stream ready! Attaching...`);
                            try {
                                session.attach(video);
                                console.log('Attached to video element');
                                connecting2.classList.remove('visible');
                                controls.classList.add('visible');
                                timer.classList.add('visible');
                                startTimer();
                                clearInterval(attachInterval);
                            } catch(e) {
                                console.error('Attach failed:', e);
                            }
                        });
                    } catch(e) {}
                }

                // State changed event
                for (const name of eventNames.stateChanged) {
                    try {
                        session.on(name, (state) => {
                            console.log(`[EVENT ${name}] State:`, state);
                            const s = String(state).toLowerCase();
                            if (s === 'connected') {
                                connecting2.classList.remove('visible');
                                controls.classList.add('visible');
                                timer.classList.add('visible');
                                startTimer();
                                // Try attaching here too
                                try { session.attach(video); } catch(e) {}
                            }
                            if (s === 'disconnected' || s === 'inactive') {
                                controls.classList.remove('visible');
                                timer.classList.remove('visible');
                                stopTimer();
                            }
                        });
                    } catch(e) {}
                }

                // Disconnected event
                for (const name of eventNames.disconnected) {
                    try {
                        session.on(name, () => {
                            console.log(`[EVENT ${name}] Disconnected`);
                            controls.classList.remove('visible');
                            timer.classList.remove('visible');
                            stopTimer();
                        });
                    } catch(e) {}
                }

                // 8. Start the session
                await session.start();
                console.log('Session started successfully');

                // 9. AGGRESSIVE RETRY: try attaching every 500ms for 15 seconds
                let retryCount = 0;
                attachInterval = setInterval(() => {
                    retryCount++;
                    if (retryCount > 30) {
                        clearInterval(attachInterval);
                        console.log('Stopped attachment retries after 15s');
                        return;
                    }
                    try {
                        session.attach(video);
                        // Check if video has a stream now
                        if (video.srcObject || video.src) {
                            console.log(`Attach succeeded on retry ${retryCount}`);
                            connecting2.classList.remove('visible');
                            controls.classList.add('visible');
                            timer.classList.add('visible');
                            if (!timerInterval) startTimer();
                            clearInterval(attachInterval);
                        }
                    } catch(e) {
                        // Silent retry
                    }
                }, 500);

            } catch (err) {
                console.error('Failed to start avatar:', err);
                showError(err.message || 'Něco se pokazilo. Zkuste to znovu.');
                avatarStarted = false;
            }
        }

        function startTimer() {
            if (timerInterval) return; // prevent double timers
            let remaining = MAX_DURATION;
            const timerEl = document.getElementById('sessionTimer');
            
            const update = () => {
                const min = Math.floor(remaining / 60);
                const sec = remaining % 60;
                timerEl.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
                if (remaining <= 10) timerEl.classList.add('warning');
                if (remaining <= 0) {
                    endSession();
                    stopTimer();
                }
                remaining--;
            };

            update();
            timerInterval = setInterval(update, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        async function toggleMute() {
            if (!session) return;
            const btn = document.getElementById('btnMute');
            try {
                if (isMuted) {
                    await session.voiceChat.unmute();
                    btn.classList.remove('muted');
                } else {
                    await session.voiceChat.mute();
                    btn.classList.add('muted');
                }
                isMuted = !isMuted;
            } catch (e) {
                console.error('Mute toggle error:', e);
            }
        }

        async function endSession() {
            const controls = document.getElementById('sessionControls');
            const timer    = document.getElementById('sessionTimer');
            const cover    = document.getElementById('coverOverlay');

            controls.classList.remove('visible');
            timer.classList.remove('visible');
            stopTimer();
            if (attachInterval) clearInterval(attachInterval);

            if (session) {
                try {
                    await session.stop();
                } catch (e) {
                    console.error('Stop error:', e);
                }
                session = null;
            }

            avatarStarted = false;
            cover.classList.remove('hidden');
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorOverlay');
            const msgEl   = document.getElementById('errorMessage');
            const connectEl = document.getElementById('connectingOverlay');

            connectEl.classList.remove('visible');
            msgEl.textContent = msg;
            errorEl.classList.add('visible');
        }

        function resetAndRetry() {
            const errorEl = document.getElementById('errorOverlay');
            const cover   = document.getElementById('coverOverlay');

            errorEl.classList.remove('visible');
            cover.classList.remove('hidden');
            avatarStarted = false;
            session = null;
        }

        // Fallback: if cover image fails to load
        document.getElementById('coverImage').addEventListener('error', function() {
            this.style.display = 'none';
            this.parentElement.style.background = 'linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%)';
        });
    </script>
</body>
</html>
